server {
    listen 80;
    server_name absensigeo.test gallery-wham-jaunt.ngrok-free.dev;

    root /var/www/html/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass absensigeo:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # Meneruskan header protokol dari Ngrok ke Laravel
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
    }
}

server {
    listen 443 ssl;
    server_name absensigeo.test gallery-wham-jaunt.ngrok-free.dev;

    ssl_certificate /etc/nginx/ssl/absensigeo.test.pem;
    ssl_certificate_key /etc/nginx/ssl/absensigeo.test-key.pem;

    root /var/www/html/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass absensigeo:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}